<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Resubmit Photos — ENICILION Motorscape 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;font-family:Arial,Helvetica,sans-serif;color:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.container{max-width:520px;width:100%;background:#111;border:1px solid #1a1a1a;border-radius:20px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.5)}
.header{background:linear-gradient(135deg,#0a0a0a,#1a1a1a);padding:28px 24px;border-bottom:2px solid #c8a95b;text-align:center}
.header h1{font-size:24px;font-weight:900;letter-spacing:6px;text-transform:uppercase;color:#c8a95b;margin-bottom:2px}
.header p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#666}
.body{padding:28px 24px}
.body h2{font-size:20px;font-weight:800;color:#fff;margin-bottom:8px}
.body .desc{font-size:14px;line-height:1.7;color:#999;margin-bottom:24px}
.app-info{background:#0c0c0c;border:1px solid #1a1a1a;border-radius:12px;padding:16px;margin-bottom:24px}
.app-info .label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.app-info .value{font-size:15px;color:#fff;font-weight:700}
.dropzone{border:2px dashed #333;border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.3s;margin-bottom:20px}
.dropzone:hover,.dropzone.active{border-color:#c8a95b;background:rgba(200,169,91,0.05)}
.dropzone input{display:none}
.dropzone .icon{font-size:40px;margin-bottom:12px}
.dropzone .text{font-size:14px;color:#888}
.dropzone .text strong{color:#c8a95b}
.preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:20px}
.preview img{width:100%;height:80px;object-fit:cover;border-radius:8px;border:1px solid #222}
.btn{display:block;width:100%;background:linear-gradient(135deg,#c8a95b,#a8893b);color:#000;font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;border:none;padding:16px;border-radius:50px;cursor:pointer;transition:opacity 0.3s}
.btn:hover{opacity:0.9}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.status{text-align:center;margin-top:16px;font-size:14px;min-height:20px}
.status.success{color:#4ade80}
.status.error{color:#ef4444}
.status.loading{color:#c8a95b}
.footer{border-top:1px solid #1a1a1a;padding:16px;text-align:center;font-size:11px;color:#444}
.footer span{color:#c8a95b;font-weight:700}
.invalid{padding:40px 24px;text-align:center}
.invalid h2{color:#ef4444;margin-bottom:12px}
.invalid p{color:#888;font-size:14px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>ENICILION</h1>
    <p>Motorscape 2026</p>
  </div>
  <div id="content">
    <div class="body" id="loading" style="text-align:center;padding:60px 24px;">
      <p style="color:#888;">Loading your application...</p>
    </div>
  </div>
  <div class="footer">&copy; 2026 <span>ENICILION</span> &middot; Own The Night</div>
</div>

<script>
const APP_ID = window.location.pathname.split("/resubmit/")[1]?.replace(/\//g, "");
const API = "/api";

let selectedFiles = [];

async function init() {
  if (!APP_ID || APP_ID.length < 10) {
    showInvalid("Invalid link. Please check the URL you received.");
    return;
  }

  try {
    const res = await fetch(API + "/genesis/resubmit-status/" + APP_ID);
    const data = await res.json();

    if (!data.success) {
      showInvalid(data.message || "Application not found.");
      return;
    }

    if (data.data.hasPhotos) {
      showInvalid("Photos have already been submitted for this application. No action needed!");
      return;
    }

    showForm(data.data);
  } catch (e) {
    showInvalid("Something went wrong. Please try again later.");
  }
}

function showInvalid(msg) {
  document.getElementById("content").innerHTML = `
    <div class="invalid">
      <h2>Oops</h2>
      <p>${msg}</p>
    </div>`;
}

function showForm(info) {
  document.getElementById("content").innerHTML = `
    <div class="body">
      <h2>📸 Resubmit Your Photos</h2>
      <p class="desc">Hi <strong style="color:#fff">${info.name}</strong>, we need your vehicle photos again due to a technical issue. Your application details are safe.</p>
      <div class="app-info">
        <div class="label">Vehicle</div>
        <div class="value">${info.vehicle || "Your registered vehicle"}</div>
      </div>
      <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" multiple accept="image/*" onchange="handleFiles(this.files)"/>
        <div class="icon">📷</div>
        <div class="text">Tap to select photos or <strong>drag & drop</strong><br/>Min 1 photo, max 5</div>
      </div>
      <div class="preview" id="preview"></div>
      <button class="btn" id="submitBtn" onclick="submitPhotos()" disabled>Upload Photos</button>
      <div class="status" id="status"></div>
    </div>`;

  const dz = document.getElementById("dropzone");
  dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("active"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("active"));
  dz.addEventListener("drop", e => { e.preventDefault(); dz.classList.remove("active"); handleFiles(e.dataTransfer.files); });
}

function handleFiles(files) {
  selectedFiles = Array.from(files).slice(0, 5);
  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  selectedFiles.forEach(f => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(f);
    preview.appendChild(img);
  });
  document.getElementById("submitBtn").disabled = selectedFiles.length === 0;
}

async function submitPhotos() {
  const btn = document.getElementById("submitBtn");
  const status = document.getElementById("status");
  btn.disabled = true;
  status.className = "status loading";
  status.textContent = "Uploading your photos...";

  const fd = new FormData();
  selectedFiles.forEach(f => fd.append("photos", f));

  try {
    const res = await fetch(API + "/genesis/resubmit-photos/" + APP_ID, { method: "POST", body: fd });
    const data = await res.json();
    if (data.success) {
      status.className = "status success";
      status.textContent = "Photos uploaded successfully! Thank you 🎉";
      document.getElementById("dropzone").style.display = "none";
      document.getElementById("preview").style.display = "none";
      btn.style.display = "none";
    } else {
      status.className = "status error";
      status.textContent = data.message || "Upload failed. Please try again.";
      btn.disabled = false;
    }
  } catch (e) {
    status.className = "status error";
    status.textContent = "Network error. Please try again.";
    btn.disabled = false;
  }
}

init();
</script>
</body>
</html>
